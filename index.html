<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Old King Lab</title>
  <meta name="description" content="Old King 的个人工具站, 用于记录网页工具, 游戏开发工具和 AI 协作实验.">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 24px;
    }

    h1 {
      font-size: 48px;
      margin: 0 0 16px;
    }

    p {
      line-height: 1.7;
      color: #d1d5db;
    }

    .tools {
      display: grid;
      gap: 16px;
      margin-top: 32px;
    }

    .card {
      display: block;
      padding: 20px;
      border: 1px solid #374151;
      border-radius: 16px;
      color: inherit;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.04);
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .card p {
      margin: 0;
    }
  </style>
</head>

<body>
  <main>
    <h1>Old King Lab</h1>

    <p>
      这里是 Old King 的个人工具站, 用来发布网页工具, 游戏开发工具, AI 协作实验和一些静态记录.
    </p>

    <section class="tools">
      <a class="card" href="/LowPolyPaletteEditor/">
        <h2>Low Poly Palette Editor</h2>
        <p>一个用于 Low Poly 风格调色板编辑的网页工具.</p>
      </a>
    </section>
  </main>
</body>
</html>
